name: Price Alert

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Alert
        run: node alert.js
