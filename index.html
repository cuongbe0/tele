<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE CRYPTO DASHBOARD</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050816;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:10px;
}

h1{
  text-align:center;
  margin-bottom:12px;
  font-size:24px;
}

.dashboard{
  max-width:520px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card{
  background:#0d132b;
  border:1px solid #00fff2;
  border-radius:18px;
  padding:14px;
  min-height:105px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.top{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.price{
  font-size:28px;
  font-weight:bold;
  margin-bottom:4px;
  transition:0.3s;
}

.vnd{
  font-size:16px;
  color:#bfc7d5;
}

.green{
  color:#00ff99;
}

.red{
  color:#ff5577;
}

</style>
</head>

      src="https://cryptologos.cc/logos/avalanche-avax-logo.png">

    <div id="avax-vnd" class="vnd"></div>

</div>

<script>

const USDVND = 26000;

const BOT_TOKEN =
"8614060040:AAEnvPS3qrgHKaYiuX1EE_U3NyEGdveFG64";

const CHAT_ID =
"700636974";

let oldPrices = {};
let alertPrices = {};

// ==========================
// TELEGRAM
// ==========================

async function sendTelegram(message){

  try{

    await fetch(
      `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          chat_id:CHAT_ID,
          text:message
        })
      }
    );

  }catch(e){

    console.log('TELEGRAM ERROR',e);

  }
}

// ==========================
// ALERT ONLY TURBO + PNIC
// ==========================

async function checkAlert(symbol, price){

  price = Number(price);

  if(isNaN(price)) return;

  if(!alertPrices[symbol]){

    alertPrices[symbol] = price;
    return;
  }

  const oldPrice =
    alertPrices[symbol];

  const percent =
    ((price - oldPrice) / oldPrice) * 100;

  if(Math.abs(percent) >= 0.5){

    let icon = '🚀';

    if(percent < 0){
      icon = '📉';
    }

    await sendTelegram(

`${icon} ${symbol} ALERT

Price: $${price}

Change: ${percent.toFixed(2)}%`

    );

    alertPrices[symbol] = price;
  }
}

// ==========================
// UPDATE UI
// ==========================

function updatePrice(id, value){

  value = Number(value);

  if(isNaN(value)) return;

  const priceEl =
    document.getElementById(id + '-price');

  const vndEl =
    document.getElementById(id + '-vnd');

  priceEl.innerHTML =
    '$' + value.toFixed(6);

  vndEl.innerHTML =
    (value * USDVND).toLocaleString('vi-VN')
    + ' đ';

  priceEl.classList.remove('green');
  priceEl.classList.remove('red');

  if(oldPrices[id]){

    if(value > oldPrices[id]){
      priceEl.classList.add('green');
    }

    if(value < oldPrices[id]){
      priceEl.classList.add('red');
    }
  }

  oldPrices[id] = value;
}

// ==========================
// BINANCE
// ==========================

async function loadBinance(){

  try{

    const res = await fetch(
      'https://api.binance.com/api/v3/ticker/price'
    );

    const data = await res.json();

    const btc =
      data.find(x=>x.symbol==='BTCUSDT');

    const eth =
      data.find(x=>x.symbol==='ETHUSDT');

    const avax =
      data.find(x=>x.symbol==='AVAXUSDT');

    if(btc){
      updatePrice('btc', btc.price);
    }

    if(eth){
      updatePrice('eth', eth.price);
    }

    if(avax){
      updatePrice('avax', avax.price);
    }

  }catch(e){
    console.log('BINANCE ERROR',e);
  }
}

// ==========================
// TURBO + PNIC
// ==========================

      {
        headers:{

          'sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv'
        }
      }
    );

    const data = await res.json();

    if(data && data.length){

      updatePrice(
        'turbo',
        data[0].turbo_price_usd
      );

      checkAlert(
        'TURBO',
        data[0].turbo_price_usd
      );

      updatePrice(
        'pnic',
        data[0].pnic_price_usd
      );

      checkAlert(
        'PNIC',
        data[0].pnic_price_usd

    console.log('MIRACLE ERROR',e);

}

          Authorization:
          'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cXR2YWptbXN2bXNmbmVtdXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUxMDg5ODQsImV4cCI6MjA3MDY4NDk4NH0.sGHT0zojZrVHA6CyVxbBb0600xIYaVRet6qP2z2GuBA'

loadBinance();
loadMiracle();

</script>

</body>
</html>
